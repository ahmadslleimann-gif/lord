name: Deploy to server

# Deploys the site over SSH (rsync) every time you push to main.
on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you trigger a deploy manually from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy with rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.SSH_PORT }}" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.htaccess.example' \
            --exclude 'assets/js/products-data.backup.js' \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}"
